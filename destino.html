<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Destino de la Taberna - Contenido</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle, #2c1a1a 0%, #111 100%);
            color: #d4af37;
            font-family: 'MedievalSharp', cursive;
            margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden;
        }

        .main-title { font-family: 'Cinzel', serif; font-size: 3rem; color: #e5e5e5; margin: 10px 0; text-shadow: 2px 2px 0px #000, 0 0 15px #ff4500; }

        .app-container { display: flex; flex-direction: row; align-items: flex-start; justify-content: center; gap: 40px; width: 95%; max-width: 1200px; }

        /* SECCIÓN RULETA */
        .wheel-section { display: flex; flex-direction: column; align-items: center; }
        .wheel-wrapper { position: relative; background: #1a1a1a; padding: 15px; border-radius: 50%; border: 5px solid #333; }
        .arrow { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 50px solid #8b0000; z-index: 10; filter: drop-shadow(0 0 5px #000); }
        canvas { border: 12px solid #4a4a4a; border-radius: 50%; background: #2a1b12; }

        /* SECCIÓN CONFIGURACIÓN (PERGAMINO) */
        .config-section { 
            width: 350px; 
            background: #e3c58e; 
            border: 8px double #8b4513; 
            border-radius: 5px; 
            height: 550px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 30px rgba(0,0,0,0.7); 
            padding: 15px;
            box-sizing: border-box;
        }
        .config-header { background: #8b4513; color: #e3c58e; padding: 10px; text-align: center; font-family: 'Cinzel', serif; margin: -15px -15px 15px -15px; }
        
        textarea {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #8b4513;
            font-family: 'MedievalSharp';
            font-size: 1.2rem;
            color: #3d2b1f;
            padding: 10px;
            resize: none;
            outline: none;
        }

        /* PERGAMINO DE RESULTADO */
        #winner-display { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #e3c58e; color: #3d2b1f; padding: 40px; border-radius: 5px; 
            display: none; font-size: 2.2rem; border: 10px double #8b4513; z-index: 100; text-align: center;
            box-shadow: 0 0 100px rgba(0,0,0,0.9); width: 500px;
        }
        
        .main-btn { background: #5d3a1a; border: 3px solid #3d2b1f; color: #d4af37; padding: 12px 30px; cursor: pointer; font-family: 'MedievalSharp'; font-size: 1.2rem; box-shadow: 0 4px 0 #2a1b12; margin-top: 15px; width: 100%;}
        .main-btn:hover { background: #7a4d26; color: white; }
    </style>
</head>
<body>

    <h1 class="main-title">Destino de la Taberna</h1>

    <div id="winner-display">
        <div id="winner-content">
            📜 EL DESTINO HA HABLADO 📜<br>
            <small>Hoy haremos:</small><br>
            <span id="winner-name" style="font-size: 3.5rem; color: #8b0000; display: block; margin: 20px 0;">---</span>
            <button onclick="document.getElementById('winner-display').style.display='none'" style="cursor:pointer; font-family: 'MedievalSharp';">Aceptar</button>
        </div>
    </div>

    <div class="app-container">
        <div class="wheel-section">
            <div class="wheel-wrapper">
                <div class="arrow"></div>
                <canvas id="canvas" width="500" height="500"></canvas>
            </div>
            <button class="main-btn" onclick="spinWheel()" style="width: 530px; font-size: 1.5rem;">⚔️ GIRAR EL DESTINO ⚔️</button>
        </div>

        <div class="config-section">
            <h2 class="config-header">Opciones de Aventura</h2>
            <p style="color: #8b4513; font-size: 0.9rem; margin-top: 0;">Escribe una opción por línea:</p>
            <textarea id="options-input" oninput="updateWheel()">Ganking en Red Zone
ZvZ con el Gremio
Dungeon de Grupo
Hellgates 2v2
PVP en Black Zone
Charla en la Taberna</textarea>
            <p style="color: #8b4513; font-size: 0.8rem; text-align: center; margin-bottom: 0;">La ruleta se actualiza sola al escribir.</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const optionsInput = document.getElementById('options-input');
        const winnerEl = document.getElementById('winner-display');
        const winnerNameEl = document.getElementById('winner-name');

        let options = [];
        let startAngle = 0;
        let arc = 0;

        function updateWheel() {
            const text = optionsInput.value;
            options = text.split('\n').filter(line => line.trim() !== "");
            drawRoulette();
        }

        function drawRoulette() {
            if (options.length === 0) { ctx.clearRect(0, 0, 500, 500); return; }
            arc = Math.PI / (options.length / 2);
            ctx.clearRect(0, 0, 500, 500);

            options.forEach((opt, i) => {
                const angle = startAngle + i * arc;
                ctx.fillStyle = i % 2 === 0 ? "#b8860b" : "#1a1a1a";
                
                ctx.beginPath(); ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, angle, angle + arc, false);
                ctx.lineTo(250, 250); ctx.fill();
                ctx.strokeStyle = "#3d2b1f"; ctx.lineWidth = 2; ctx.stroke();

                ctx.save();
                ctx.fillStyle = i % 2 === 0 ? "#1a1a1a" : "#d4af37";
                ctx.translate(250 + Math.cos(angle + arc / 2) * 170, 250 + Math.sin(angle + arc / 2) * 170);
                ctx.rotate(angle + arc / 2 + Math.PI / 2);
                ctx.font = "bold 14px 'MedievalSharp'";
                
                // Cortar texto si es muy largo
                let text = opt.length > 20 ? opt.substring(0, 17) + "..." : opt;
                ctx.fillText(text, -ctx.measureText(text).width / 2, 0);
                ctx.restore();
            });

            ctx.beginPath(); ctx.arc(250, 250, 15, 0, 2 * Math.PI);
            ctx.fillStyle = "#cd7f32"; ctx.fill(); ctx.stroke();
        }

        let spinning = false;
        function spinWheel() {
            if (spinning || options.length < 2) return;
            spinning = true;
            winnerEl.style.display = 'none';
            
            let spinAngleStart = Math.random() * 10 + 25;
            let spinTime = 0;
            let spinTimeTotal = Math.random() * 3 + 4 * 1000;

            function rotate() {
                spinTime += 30;
                if (spinTime >= spinTimeTotal) {
                    spinning = false;
                    const degrees = startAngle * 180 / Math.PI + 90;
                    const index = Math.floor((360 - degrees % 360) / (arc * 180 / Math.PI));
                    const winner = options[index >= options.length ? 0 : index];
                    
                    winnerNameEl.innerText = winner;
                    winnerEl.style.display = 'block';
                    return;
                }
                const easeOut = (t, b, c, d) => { t /= d; t--; return c * (t * t * t + 1) + b; };
                startAngle += ((spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal)) * Math.PI / 180);
                drawRoulette();
                setTimeout(rotate, 30);
            }
            rotate();
        }

        // Inicializar
        updateWheel();
    </script>
</body>
</html>
